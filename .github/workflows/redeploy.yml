name: Redeploy Home

on:
  push:
    branches:
      - master
      - develop

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Start Cloudflare Access TCP proxy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          nohup cloudflared access tcp --hostname ssh.nmayes.dev --url localhost:2222 > /tmp/cloudflared.log 2>&1 &
          sleep 5

      - name: Verify SSH connectivity
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p 2222 \
              nathan@localhost \
              'hostname && whoami'

      - name: Deploy Prod (master)
        if: github.ref == 'refs/heads/master'
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p 2222 \
              nathan@localhost \
              'cd ~/server/prod/apps/home && docker compose restart home'

      - name: Deploy Dev (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p 2222 \
              nathan@localhost \
              'cd ~/server/dev/apps/home && docker compose restart home'
